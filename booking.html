<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <!-- Required Task 1a Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book a professional dog grooming session with Snazzy Paws Hamilton. Select your service, choose a date on our live calendar, and reserve your slot.">
    
    <!-- Bootstrap CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style Overrides -->
    <link rel="stylesheet" href="css/snazzy.css">
    
    <title>Snazzy Paws Booking</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light text-dark">

    <!-- START: NAVIGATION COMPONENT -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
        <div class="container-fluid px-md-5">
            <!-- Brand & Logo Identity -->
            <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
                <div class="logo-container rounded-circle bg-white overflow-hidden" style="width: 60px; height: 60px;">
                    <img src="Public/images/snazzy-logo.png" alt="snazzy paws logo" class="w-100 h-100 object-fit-cover">
                </div>
                <span class="fw-bold tracking-wide">Snazzy Paws Grooming</span>
            </a>

            <!-- Mobile Hamburger Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#snazzyNav" aria-controls="snazzyNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation Menu Items -->
            <div class="collapse navbar-collapse" id="snazzyNav">
                <div class="navbar-nav ms-auto gap-lg-3 mt-3 mt-lg-0 fw-medium">
                    <a class="nav-link text-white-50" href="index.html">Home</a>
                    <a class="nav-link text-white-50" href="services.html">Services</a>
                    <a class="nav-link text-white-50" href="gallery.html">Gallery</a>
                    <a class="nav-link active" href="booking.html" aria-current="page">Booking</a>
                    <a class="nav-link text-white-50" href="contact.html">Contact</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- END: NAVIGATION COMPONENT -->

    <!-- START: BOOKING MAIN CONTENT CONTAINER -->
    <main class="flex-grow-1 container my-5 px-4 px-md-5">
        <section class="booking-section">
            <h1 class="display-4 fw-bold text-primary mb-4 text-center text-md-start">Book a Session</h1>

            <!-- Dashboard Dashboard Split Row Wrapper -->
            <div class="row g-5">
                
                <!-- START: CALENDAR COLUMN -->
                <div class="col-12 col-lg-6 d-flex flex-column gap-4">
                    
                    <!-- Service Select Box -->
                    <div class="bg-white p-4 rounded-4 shadow-sm border">
                        <label for="service-select" class="form-label fw-bold text-secondary">Select Service</label>
                        <select id="service-select" class="form-select form-select-lg rounded-3">
                            <option>Bath & Brush</option>        
                            <option>Haircut</option>
                            <option>Nail trim</option>
                            <option>Ear cleaning</option>
                            <option>Teeth brushing</option>
                            <option>De-shedding treatment</option>
                            <option>Flea and tick treatment</option>
                            <option>Spa package</option>
                            <option>Express service</option>
                            <option>Medicated bath</option>
                            <option>Special Breed Cuts</option>
                            <option>Puppy package</option>
                            <option>Senior dog</option>
                            <option>Full grooming package</option>
                        </select>
                    </div>

                    <!-- Calendar Wrapper Component -->
                    <div class="bg-white p-4 rounded-4 shadow-sm border">
                        <h2 class="h4 fw-bold text-dark mb-3">Select a Date</h2>
                        <div class="row row-cols-7 g-1 text-center">
                            
                            <!-- Weekday grid headers -->
                            <div class="col py-2 fw-bold text-muted small">Mon</div>
                            <div class="col py-2 fw-bold text-muted small">Tue</div>
                            <div class="col py-2 fw-bold text-muted small">Wed</div>
                            <div class="col py-2 fw-bold text-muted small">Thu</div>
                            <div class="col py-2 fw-bold text-muted small">Fri</div>
                            <div class="col py-2 fw-bold text-muted small">Sat</div>
                            <div class="col py-2 fw-bold text-muted small">Sun</div>

                            <!-- Row 1 dates -->
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">1</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">2</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">3</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">4</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">5</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">6</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">7</button></div>

                            <!-- Row 2 dates -->
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">8</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">9</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">10</button></div>
                            <div class="col"><button class="btn btn-light text-muted w-100 py-2 border-0 disabled" style="opacity: 0.4; text-decoration: line-through;">11</button></div>
                            <div class="col"><button class="btn btn-primary w-100 py-2 fw-bold rounded-3 shadow-sm">12</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">13</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">14</button></div>

                            <!-- Row 3 dates -->
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">15</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">16</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">17</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">18</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">19</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">20</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">21</button></div>

                            <!-- Row 4 dates -->
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">22</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">23</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">24</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">25</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">26</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">27</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">28</button></div>

                            <!-- Row 5 dates -->
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">29</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">30</button></div>
                            <div class="col"><button class="btn btn-outline-secondary w-100 py-2">31</button></div>

                        </div>
                    </div>

                    <!-- Available Times Area -->
                    <div class="bg-white p-4 rounded-4 shadow-sm border">
                        <h3 class="h5 fw-bold text-dark mb-3">Available Times</h3>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-outline-primary px-4 py-2 rounded-3">09:00</button>
                            <button class="btn btn-outline-primary px-4 py-2 rounded-3">10:30</button>
                            <button class="btn btn-outline-primary px-4 py-2 rounded-3">13:00</button>
                            <button class="btn btn-light px-4 py-2 rounded-3 text-muted border" disabled>15:00 (Full)</button>
                        </div>
                    </div>
                </div>
                <!-- END: CALENDAR COLUMN -->

                <!-- START: DETAILS COLUMN -->
                <div class="col-12 col-lg-6">
                    <form class="bg-white p-4 p-lg-5 rounded-4 shadow-sm border d-flex flex-column gap-3">
                        
                        <div class="form-group">
                            <label for="time-slot" class="form-label fw-semibold text-secondary">Selected Time</label>
                            <select id="time-slot" class="form-select form-select-lg rounded-3">
                                <option>09:00 AM</option>
                                <option>10:30 AM</option>
                                <option>01:00 PM</option>
                                <option>03:00 PM</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="user-name" class="form-label fw-semibold text-secondary">Name</label>
                            <input type="text" id="user-name" class="form-control form-control-lg rounded-3" placeholder="Full Name" required>
                        </div>

                        <div class="form-group">
                            <label for="user-email" class="form-label fw-semibold text-secondary">Email</label>
                            <input type="email" id="user-email" class="form-control form-control-lg rounded-3" placeholder="Email Address" required>
                        </div>

                        <div class="form-group">
                            <label for="user-phone" class="form-label fw-semibold text-secondary">Phone</label>
                            <input type="tel" id="user-phone" class="form-control form-control-lg rounded-3" placeholder="Phone Number" required>
                        </div>

                        <div class="form-group">
                            <label for="dog-name" class="form-label fw-semibold text-secondary">Dog's Name</label>
                            <input type="text" id="dog-name" class="form-control form-control-lg rounded-3" placeholder="Dog's Name" required>
                        </div>

                        <div class="form-group">
                            <label for="dog-breed" class="form-label fw-semibold text-secondary">Dog's Breed</label>
                            <input type="text" id="dog-breed" class="form-control form-control-lg rounded-3" placeholder="Dog's Breed" required>
                        </div>

                        <div class="form-group">
                            <label for="dog-age" class="form-label fw-semibold text-secondary">Dog's Age</label>
                            <input type="number" id="dog-age" class="form-control form-control-lg rounded-3" placeholder="Dog's Age" required>
                        </div>

                        <div class="form-group">
                            <label for="requests" class="form-label fw-semibold text-secondary">Special Requests</label>
                            <textarea id="requests" rows="4" class="form-control form-control-lg rounded-3" placeholder="Any special instructions..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3 shadow-sm mt-2 py-3 text-uppercase tracking-wider">Book Now</button>
                    </form>
                </div>
                <!-- END: DETAILS COLUMN -->

            </div>
        </section>
    </main>
    <!-- END: BOOKING MAIN CONTENT CONTAINER -->

    <!-- START: FOOTER COMPONENT -->
    <footer class="footer bg-dark text-light border-top border-secondary py-4 px-md-5 mt-auto">
        <div class="container-fluid d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <div class="opening-hours text-center text-md-start">
                <p class="mb-0"><strong class="text-uppercase tracking-wider text-primary">Hours:</strong> Mon-Sat 9am-5pm <span class="d-block d-md-inline ms-md-3 text-muted">| Sun Closed</span></p>
            </div>
            
            <div class="footer-links text-center small">
                <a href="privacy.html" class="text-white-50 text-decoration-none mx-2 hover-white">Privacy Policy</a>
                <span class="text-secondary">|</span>
                <!-- Staff portal nav for marker to easily access this would normally be password protected -->
                <a href="roster.html" class="text-white-50 text-decoration-none mx-2 hover-white">Staff Portal 🔒</a>
            </div>

            <div class="copy-text text-center text-md-end text-muted">
                <p class="mb-0">&copy; 2026 Snazzy Paws Grooming</p>
            </div>
        </div>
    </footer>
    <!-- END: FOOTER COMPONENT -->

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
