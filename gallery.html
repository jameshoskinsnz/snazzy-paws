<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse our Snazzy Paws transformation gallery. See the beautifully groomed dogs of Hamilton and the wider Waikato region.">
    
    <!-- Bootstrap CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style Overrides -->
    <link rel="stylesheet" href="css/snazzy.css">
    
    <title>Snazzy Paws Gallery</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light text-dark">

    <!-- START: NAVIGATION COMPONENT -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
        <div class="container-fluid px-md-5">
            <!-- Brand & Logo Identity -->
            <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
                <div class="logo-container rounded-circle bg-white overflow-hidden" style="width: 60px; height: 60px;">
                    <img src="Public/images/snazzy-logo.png" alt="snazzy paws logo" class="w-100 h-100 object-fit-cover">
                </div>
                <span class="fw-bold tracking-wide">Snazzy Paws Grooming</span>
            </a>

            <!-- Mobile Hamburger Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#snazzyNav" aria-controls="snazzyNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation Menu Items -->
            <div class="collapse navbar-collapse" id="snazzyNav">
                <div class="navbar-nav ms-auto gap-lg-3 mt-3 mt-lg-0 fw-medium">
                    <a class="nav-link text-white-50" href="index.html">Home</a>
                    <a class="nav-link text-white-50" href="services.html">Services</a>
                    <a class="nav-link active" href="gallery.html" aria-current="page">Gallery</a>
                    <a class="nav-link text-white-50" href="booking.html">Booking</a>
                    <a class="nav-link text-white-50" href="contact.html">Contact</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- END: NAVIGATION COMPONENT -->

    <!-- START: GALLERY CONTENT AREA -->
    <main class="flex-grow-1 container my-5 px-4 px-md-5">
        <section class="gallery-section mb-4">
            
            <h1 class="display-4 fw-bold text-primary mb-4 text-center text-md-start">Gallery</h1>
            
            <!-- Asymmetric Grid Structure -->
            <div class="row g-4 align-items-start">
                
                <!-- Featured Left Image Column -->
                <div class="col-12 col-lg-9">
                    <div class="featured-img rounded-4 shadow-sm overflow-hidden bg-white p-2 border">
                        <img src="Public/images/featured-dog.jpg" alt="A beautifully groomed Golden Retriever" class="w-100 rounded-3 object-fit-cover" style="max-height: 600px; height: auto;">
                    </div>
                    <p class="caption text-muted small mt-2 ps-1 border-start border-primary border-3 ms-2">
                        Can full screen images / Images are scrollable
                    </p>
                </div>
                
                <!-- Right Thumbnail Sidebar (True 4x4 Grid to address previous feedback) -->
                <div class="col-12 col-lg-3">
                    <div class="row row-cols-2 row-cols-sm-4 row-cols-lg-4 g-2">
                        
                        <!-- Row 1 of thumbnails -->
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog1.jpg" alt="Dog 1" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog2.jpg" alt="Dog 2" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog3.jpg" alt="Dog 3" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog4.jpg" alt="Dog 4" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        
                        <!-- Row 2 of thumbnails -->
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog5.jpg" alt="Dog 5" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog6.jpg" alt="Dog 6" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog7.jpg" alt="Dog 7" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog8.jpg" alt="Dog 8" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        
                        <!-- Row 3 of thumbnails -->
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog9.jpg" alt="Dog 9" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog1.jpg" alt="Dog 10" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog2.jpg" alt="Dog 11" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog3.jpg" alt="Dog 12" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        
                        <!-- Row 4 of thumbnails -->
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog4.jpg" alt="Dog 13" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog5.jpg" alt="Dog 14" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        <div class="col"><div class="thumb rounded-3 overflow-hidden border shadow-sm ratio ratio-1x1 bg-white p-1"><img src="Public/images/dog6.jpg" alt="Dog 15" class="rounded-2 object-fit-cover w-100 h-100"></div></div>
                        
                        <!-- More Images Indicator -->
                        <div class="col">
                            <div class="more-images bg-secondary-subtle rounded-3 d-flex align-items-center justify-content-center text-secondary fw-bold border ratio ratio-1x1" style="cursor: pointer;">
                                <span class="fs-5">+5</span>
                            </div>
                        </div>
                        
                    </div>
                </div>
                
            </div>
        </section>
    </main>
    <!-- END: GALLERY CONTENT AREA -->

    <!-- START: FOOTER COMPONENT -->
    <footer class="footer bg-dark text-light border-top border-secondary py-4 px-md-5 mt-auto">
        <div class="container-fluid d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <div class="opening-hours text-center text-md-start">
                <p class="mb-0"><strong class="text-uppercase tracking-wider text-primary">Hours:</strong> Mon-Sat 9am-5pm <span class="d-block d-md-inline ms-md-3 text-muted">| Sun Closed</span></p>
            </div>
            
            <div class="footer-links text-center small">
                <a href="privacy.html" class="text-white-50 text-decoration-none mx-2 hover-white">Privacy Policy</a>
                <span class="text-secondary">|</span>
                <!-- Staff portal nav for marker to easily access this would normally be password protected -->
                <a href="roster.html" class="text-white-50 text-decoration-none mx-2 hover-white">Staff Portal 🔒</a>
            </div>

            <div class="copy-text text-center text-md-end text-muted">
                <p class="mb-0">&copy; 2026 Snazzy Paws Grooming</p>
            </div>
        </div>
    </footer>
    <!-- END: FOOTER COMPONENT -->

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
