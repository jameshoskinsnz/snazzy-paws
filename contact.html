<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel= "stylesheet" href="css/snazzy.css">
    
    <title>Snazzy Paws Contact</title>
</head>
<body>
    <nav class="nav-tab">
        <div class="brand-container">
            <div class="logo-container">
            <img src="Public/images/snazzy-logo.png" alt="snazzy paws logo">
            </div>
            <span class="brand-name">Snazzy Paws Grooming</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="gallery.html">Gallery</a>
            <a href="booking.html">Booking</a>
            <a href="contact.html" aria-current="page">Contact</a>
        </div>
    </nav>
    <main>
        <section class="contact-container page-wrapper">
            <div class="contact-info">
                <h1>Contact Us</h1>
                <p>We are based in Hamilton and would love to hear from you!</p>
                
                <form class="contact-form">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Phone (optional)</label>
                    <input type="tel" id="phone" name="phone">

                    <label for="query">Query</label>
                    <textarea id="query" name="query" rows="5"></textarea>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>

            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d100912.6818977633!2d175.24838999999997!3d-37.777821!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6d6d227487a63621%3A0x500ef6143a29903!2sHamilton!5e0!3m2!1sen!2snz!4v1778580053575!5m2!1sen!2snz" width="800" height="600" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="opening-hours">
            <p><strong>Hours:</strong> Mon-Sat 9am-5pm <br> Sun Closed</p>
        </div>
        
        <div class="copy-text">
            <p>&copy; 2026 Snazzy Paws Grooming</p>
        </div>
    </footer>
</body>
</html>
