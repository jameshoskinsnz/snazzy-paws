<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <!-- Required Task 1a Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Snazzy Paws Grooming in Hamilton. Send us a message or find our salon location on the map for your next dog grooming appointment.">
    
    <!-- Bootstrap CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style Overrides -->
    <link rel="stylesheet" href="css/snazzy.css">
    
    <title>Snazzy Paws Contact</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light text-dark">

    <!-- START: NAVIGATION COMPONENT -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
        <div class="container-fluid px-md-5">
            <!-- Brand & Logo Identity -->
            <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
                <div class="logo-container rounded-circle bg-white overflow-hidden" style="width: 60px; height: 60px;">
                    <img src="Public/images/snazzy-logo.png" alt="snazzy paws logo" class="w-100 h-100 object-fit-cover">
                </div>
                <span class="fw-bold tracking-wide">Snazzy Paws Grooming</span>
            </a>

            <!-- Mobile Hamburger Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#snazzyNav" aria-controls="snazzyNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation Menu Items -->
            <div class="collapse navbar-collapse" id="snazzyNav">
                <div class="navbar-nav ms-auto gap-lg-3 mt-3 mt-lg-0 fw-medium">
                    <a class="nav-link text-white-50" href="index.html">Home</a>
                    <a class="nav-link text-white-50" href="services.html">Services</a>
                    <a class="nav-link text-white-50" href="gallery.html">Gallery</a>
                    <a class="nav-link text-white-50" href="booking.html">Booking</a>
                    <a class="nav-link active" href="contact.html" aria-current="page">Contact</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- END: NAVIGATION COMPONENT -->

    <!-- START: MAIN CONTENT AREA -->
    <main class="flex-grow-1 container my-5 px-4 px-md-5">
        
        <!-- Symmetrical 2-Column Split (Form on Left | Map on Right) -->
        <section class="row g-5 align-items-stretch">
            
            <!-- Left Side Column: Form Information Layout -->
            <div class="col-12 col-md-6 d-flex flex-column justify-content-between">
                <div class="mb-4">
                    <h1 class="display-5 fw-bold text-primary mb-2">Contact Us</h1>
                    <p class="lead text-muted">We are based in Hamilton and would love to hear from you!</p>
                </div>
                
                <!-- Styled Bootstrap Form Card Container -->
                <form class="bg-white p-4 p-lg-5 rounded-4 shadow-sm border d-flex flex-column gap-3">
                    <div class="form-group">
                        <label for="name" class="form-label fw-semibold text-secondary">Name</label>
                        <input type="text" id="name" name="name" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label fw-semibold text-secondary">Email</label>
                        <input type="email" id="email" name="email" class="form-control form-control-lg rounded-3" required>
                    </div>

                    <div class="form-group">
                        <label for="phone" class="form-label fw-semibold text-secondary">Phone <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="tel" id="phone" name="phone" class="form-control form-control-lg rounded-3">
                    </div>

                    <div class="form-group">
                        <label for="query" class="form-label fw-semibold text-secondary">Query</label>
                        <textarea id="query" name="query" rows="4" class="form-control form-control-lg rounded-3"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3 shadow-sm mt-2 py-3 text-uppercase tracking-wider">Send Message</button>
                </form>
            </div>

            <!-- Right Side Column: Map Integration Container -->
            <div class="col-12 col-md-6 d-flex">
                <!-- Using an aspect ratio helper container prevents layout popping on desktop frames -->
                <div class="w-100 rounded-4 shadow-sm overflow-hidden border bg-white p-2 d-flex align-items-stretch">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d100912.6818977633!2d175.24838999999997!3d-37.777821!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6d6d227487a63621%3A0x500ef6143a29903!2sHamilton!5e0!3m2!1sen!2snz!4v1778580053575!5m2!1sen!2snz" 
                        class="w-100 h-100 rounded-3" 
                        style="border:0; min-height: 450px;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe >
                </div>
            </div>
            
        </section>
        
    </main>
    <!-- END: MAIN CONTENT AREA -->

    <!-- START: FOOTER COMPONENT -->
    <footer class="footer bg-dark text-light border-top border-secondary py-4 px-md-5 mt-auto">
        <div class="container-fluid d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <div class="opening-hours text-center text-md-start">
                <p class="mb-0"><strong class="text-uppercase tracking-wider text-primary">Hours:</strong> Mon-Sat 9am-5pm <span class="d-block d-md-inline ms-md-3 text-muted">| Sun Closed</span></p>
            </div>
            
            <div class="footer-links text-center small">
                <a href="privacy.html" class="text-white-50 text-decoration-none mx-2 hover-white">Privacy Policy</a>
                <span class="text-secondary">|</span>
                <!-- Staff portal nav for marker to easily access this would normally be password protected -->
                <a href="roster.html" class="text-white-50 text-decoration-none mx-2 hover-white">Staff Portal 🔒</a>
            </div>

            <div class="copy-text text-center text-md-end text-muted">
                <p class="mb-0">&copy; 2026 Snazzy Paws Grooming</p>
            </div>
        </div>
    </footer>
    <!-- END: FOOTER COMPONENT -->

    <!-- Framework JavaScript Bundle for responsive elements like Mobile Hamburger Toggle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
